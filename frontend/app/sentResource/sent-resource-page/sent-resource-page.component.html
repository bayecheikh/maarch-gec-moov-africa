<div class="mat-dialog-content-container">
    <h1 mat-dialog-title>
        <span [title]="data.title" style="flex: 1;">
            {{ data.title }}
        </span>
        <button (click)="closeModal()" [title]="'lang.saveAndClose' | translate" mat-icon-button>
            <mat-icon aria-hidden="true" class="fa fa-times"></mat-icon>
        </button>
    </h1>
    <mat-dialog-content class="modal-container">
        <div *ngIf="loading" class="loading">
            <mat-spinner aria-live="polite" role="status" style="margin:auto;"></mat-spinner>
        </div>
        <app-mail-editor
            #appMailEditor
            (afterLoadPaperAr)="paperArContent=$event"
            *ngIf="!loading"
            [emailId]="data.emailId"
            [emailType]="data.emailType"
            [resId]="data.resId">
        </app-mail-editor>
        <app-document-viewer
            #appDocumentViewer
            *ngIf="paperArContent !== null"
            [base64]="paperArContent"
            [editMode]="false"
            style="display:block;height:400px;width:100%;overflow: auto;">
        </app-document-viewer>
    </mat-dialog-content>
    <span class="divider-modal"></span>
    <div *ngIf="!loading" class="actions" mat-dialog-actions>
        <button *ngIf="!appMailEditor?.readonly && privilegeService.hasCurrentUserPrivilege('sendmail')"
                [matMenuTriggerFor]="emailActionMenu"
                color="primary"
                mat-raised-button
                style="min-width: auto;width: 30px;padding: 0;background-color: white; color: grey;">
            <mat-icon aria-hidden="true" class="fas fa-ellipsis-v" style="height:auto;"></mat-icon>
        </button>
        <mat-menu #emailActionMenu="matMenu" [class]="'attachListMenu'">
            <button (click)="appMailEditor?.switchEditionMode()" *ngIf="appMailEditor?.htmlMode" mat-menu-item>
                {{ 'lang.switchInPlainText' | translate }}
            </button>
            <button (click)="appMailEditor?.switchEditionMode()" *ngIf="!appMailEditor?.htmlMode" mat-menu-item>
                {{ 'lang.switchInHtml' | translate }}
            </button>
        </mat-menu>
        <button (click)="onSubmit()"
                *ngIf="!loading && (!appMailEditor?.readonly || data.emailType !== 'acknowledgementReceipt') && privilegeService.hasCurrentUserPrivilege('sendmail')"
                [disabled]="appMailEditor?.recipients.length === 0 || appMailEditor?.emailSubject.length > 256"
                color="primary"
                mat-raised-button>
            {{ appMailEditor?.readonly ? ('lang.sendAnother' | translate) : ('lang.send' | translate) }}
        </button>
        <button (click)="deleteEmail()" *ngIf="data.emailId && data.emailType === 'email'"
                [disabled]="headerService.user.id !== appMailEditor?.emailCreatorId || appMailEditor?.emailStatus === 'SENT' || appMailEditor?.emailStatus === 'WAITING'"
                color="warn"
                mat-raised-button>{{ 'lang.delete' | translate }}
        </button>
    </div>
</div>
