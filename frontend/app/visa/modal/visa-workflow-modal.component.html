<div class="mat-dialog-content-container">
    <h1 mat-dialog-title>
        <span style="flex: 1;">
            {{ data.title }}
        </span>
        <button (click)="dialogRef.close()" [title]="'lang.close' | translate" mat-icon-button>
            <mat-icon class="fa fa-times"></mat-icon>
        </button>
    </h1>
    <mat-dialog-content>
        <app-external-visa-workflow
            #appExternalVisaWorkflow
            [adminMode]="false">
        </app-external-visa-workflow>
    </mat-dialog-content>
</div>
