<button mat-fab cdkDrag
  [matBadge]="countMissingLang"
  [matMenuTriggerFor]="menu"
  color="warn"
  class="missing-var-lang-btn">
  <mat-icon class="fas fa-toolbox" style="height: auto;font-size: 23px;"></mat-icon>
</button>
<mat-menu #menu="matMenu" [class]="'devToolListMenu'">
  <button mat-menu-item
    (click)="openLangTool()"
    [title]="'lang.missingLangVariables' | translate"
    [disabled]="countMissingLang === 0"
  >
    <mat-icon color="primary" class="fas fa-language" style="height: auto;"></mat-icon>
    <span>{{ 'lang.missingLangVariables' | translate }}</span>&nbsp;&nbsp;<span [matBadge]="countMissingLang">&nbsp;</span>
  </button>
</mat-menu>
