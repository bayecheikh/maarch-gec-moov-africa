<button *ngIf="ragtimeService.showLogo"
        mat-fab color="primary" aria-label="Open IA" cdkDrag cdkDragBoundary=".maarch-content-root"
        style="z-index: 9999999;position:absolute;right:65px;bottom:40px"
        (mousedown)="onMouseDown($event)"
        (mouseup)="onMouseUp($event)"
        (click)="openRagtime()"
        cdkDragLockAxis="y">
    <mat-icon *ngIf="pluginUrl !== ''" style="position:absolute;top:-5px;left:-5px">
        <img [src]="pluginUrl + '/assets/MaarchieLogo.png'" style="height:260%;width:auto;">
    </mat-icon>
</button>
